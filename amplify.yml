version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Reuse the Node 24.x already baked into the Amplify build image (see
        # .nvmrc); only fall back to a download if the image lacks it. Avoids
        # re-fetching the Node tarball on every build.
        - nvm use 2>/dev/null || nvm install
        - node -v && npm -v
        # Vite 8's rolldown/oxc toolchain has platform-specific wasm32-wasi
        # optional deps (@emnapi/*) that npm prunes from a macOS-generated
        # lockfile, so `npm ci` fails the strict sync check on the linux-x64
        # builder. `npm install` reconciles them instead of erroring out.
        #
        # PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD skips the ~hundreds-of-MB Chromium
        # download pulled in by the playwright/@vitest test deps — the
        # production build only runs `tsc -b && vite build` and never a browser.
        # --prefer-offline reuses the cached npm store when node_modules is warm.
        - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm install --no-audit --no-fund --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: X-Frame-Options
          value: DENY
        - key: X-Content-Type-Options
          value: nosniff
        - key: Referrer-Policy
          value: strict-origin-when-cross-origin
        - key: Strict-Transport-Security
          value: 'max-age=63072000; includeSubDomains; preload'
        - key: Content-Security-Policy
          value: "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests"
        - key: Permissions-Policy
          value: 'accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), interest-cohort=()'
    - pattern: '/assets/**'
      headers:
        - key: Cache-Control
          value: 'public, max-age=31536000, immutable'
