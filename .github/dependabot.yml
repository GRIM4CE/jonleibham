version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # typescript-eslint's peer range caps TypeScript at <6.1.0, and Amplify's
      # `npm install` fails ERESOLVE beyond it. Allow patches only; drop this
      # once typescript-eslint supports newer TypeScript.
      - dependency-name: typescript
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      prod-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
